apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.36.0 (HEAD)
  labels:
    io.kompose.service: airflow-webserver
  name: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: airflow-webserver
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.36.0 (HEAD)
      labels:
        io.kompose.service: airflow-webserver
    spec:
      containers:
        - args:
            - bash
            - -c
            - |2
                airflow db migrate &&
                airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com &&
                exec airflow webserver
          env:
            - name: AIRFLOW__CELERY__BROKER_URL
              value: redis://:redispass123@redis:6379/0
            - name: AIRFLOW__CELERY__RESULT_BACKEND
              value: redis://:redispass123@redis:6379/0
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__FERNET_KEY
              value: YlCImzjge_TeZc6jGlfZ8xu5Avn5r1MjEYxEhRjyJ-Y=
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__CORE__SECRET_KEY
              value: your-secret-key-here
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://plantuser:plantpassword123@postgres:5432/plant_analytics
            - name: MINIO_BUCKET
              value: egrid-data
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ROOT_PASSWORD
              value: egridpass123
            - name: MINIO_ROOT_USER
              value: egriduser
            - name: POSTGRES_DB
              value: plant_analytics
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PASSWORD
              value: plantpassword123
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: plantuser
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PASSWORD
              value: egridpass123
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: egriduser
          image: docker-airflow-webserver
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:8080/health
            failureThreshold: 5
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: airflow-webserver
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/airflow
              name: airflow-webserver-cm0
          imagePullPolicy: Never
      restartPolicy: Always
      volumes:
        - configMap:
            name: airflow-webserver-cm0
          name: airflow-webserver-cm0
