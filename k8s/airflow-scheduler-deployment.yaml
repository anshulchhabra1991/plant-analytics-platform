apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.36.0 (HEAD)
  labels:
    io.kompose.service: airflow-scheduler
  name: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: airflow-scheduler
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.36.0 (HEAD)
      labels:
        io.kompose.service: airflow-scheduler
    spec:
      containers:
        - args:
            - bash
            - -c
            - |2
                exec airflow scheduler
          env:
            - name: AIRFLOW__CELERY__BROKER_URL
              value: redis://:redispass123@redis:6379/0
            - name: AIRFLOW__CELERY__RESULT_BACKEND
              value: redis://:redispass123@redis:6379/0
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__FERNET_KEY
              value: YlCImzjge_TeZc6jGlfZ8xu5Avn5r1MjEYxEhRjyJ-Y=
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__CORE__SECRET_KEY
              value: your-secret-key-here
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://plantuser:plantpassword123@postgres:5432/plant_analytics
            - name: MINIO_BUCKET
              value: egrid-data
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ROOT_PASSWORD
              value: egridpass123
            - name: MINIO_ROOT_USER
              value: egriduser
            - name: POSTGRES_DB
              value: plant_analytics
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PASSWORD
              value: plantpassword123
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: plantuser
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PASSWORD
              value: egridpass123
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: egriduser
          image: docker-airflow-scheduler
          livenessProbe:
            exec:
              command:
                - airflow
                - info
            failureThreshold: 5
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          name: airflow-scheduler
          volumeMounts:
            - mountPath: /opt/airflow
              name: airflow-scheduler-cm1
          imagePullPolicy: Never
      restartPolicy: Always
      volumes:
        - configMap:
            name: airflow-scheduler-cm1
          name: airflow-scheduler-cm1
