apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.36.0 (HEAD)
  labels:
    io.kompose.service: backend-api
  name: backend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend-api
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.36.0 (HEAD)
      labels:
        io.kompose.service: backend-api
    spec:
      containers:
        - args:
            - node
            - dist/main.js
          env:
            - name: NODE_ENV
              value: development
            - name: POSTGRES_DB
              value: plant_analytics
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PASSWORD
              value: plantpassword123
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: plantuser
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PASSWORD
              value: redispass123
            - name: REDIS_PORT
              value: "6379"
          image: backend-api
          name: plant-analytics-backend-api
          ports:
            - containerPort: 3000
              protocol: TCP
          imagePullPolicy: Never
      restartPolicy: Always
